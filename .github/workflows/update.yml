name: Update

permissions:
  contents: read
  packages: read

on:
  schedule:
    - cron: "0 0 * * *"  # TODO: set the desired schedule
  workflow_dispatch:
    inputs:
      limit:
        description: "Optional cap on the number of new items to process in this run."
        required: false
        type: number
        default: 2000

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets._GITHUB_API_KEY }}

jobs:
  Update:
    permissions:
      actions: write
      contents: read
      packages: read
    runs-on: ubuntu-latest

    steps:
      - name: Check for running workflows
        env:
          GH_TOKEN: ${{ secrets._GITHUB_API_KEY }}
        run: |
          RUNNING_COUNT=$(gh run list --repo "${{ github.repository }}" --workflow "${{ github.workflow }}" --status in_progress --json databaseId | jq '. | length')

          if [ "$RUNNING_COUNT" -gt 1 ]; then
            echo "Another run is already in progress. Cancelling this run..."
            gh run cancel --repo "${{ github.repository }}" ${{ github.run_id }}
            # Sleep to allow cancellation to propagate
            sleep 60
          fi

      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets._GITHUB_API_KEY }}
          submodules: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install git-annex
        run: |
          sudo apt-get update
          sudo apt-get install -y git-annex

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets._GITHUB_API_KEY }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Run update with provenance
        env:
          REPO_URL: https://x-access-token:${{ secrets._GITHUB_API_KEY }}@github.com/${{ github.repository }}.git
          WORKSPACE: ${{ github.workspace }}
          LIMIT: ${{ github.event.inputs.limit || '2000' }}
          GITHUB_SHA: ${{ github.sha }}
          IMAGE: ghcr.io/dandi-cache/<cache-name>:latest  # TODO: set the cache name
        run: bash code/update_pipeline.sh

  NotifyOnFailure:
    runs-on: ubuntu-latest
    needs: [ Update ]
    if: ${{ always() && failure() }}
    permissions: {}
    steps:
      - uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "CI Failure: DANDI Cache: <cache-name>"  # TODO: set the cache name
          to: cody.c.baker.phd@gmail.com  # Add more with comma separation (no spaces)
          from: DANDI Cache <dandi-cache@users.noreply.github.com>
          body: "Please check the latest run of the DANDI Cache update: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
